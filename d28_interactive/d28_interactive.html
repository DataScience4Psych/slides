# Learning Goals

---

## Learning Goals

By the end of this session, you will be able to...

- Describe the architecture of a Shiny app (UI + server + reactivity)
- Build a user interface with inputs and outputs using `fluidPage()`
- Write server logic that connects inputs to outputs via `render*()` and `*Output()` functions
- Explain how reactivity works and why it matters
- Create an interactive data visualization app from scratch
- Deploy a Shiny app and integrate Shiny into R Markdown documents

# What is Shiny?

---

## Shiny

.pull-left[
- Shiny is an R package that makes it easy to build interactive web apps straight from R
- You can host standalone apps on a webpage or embed them in R Markdown documents or build dashboards
- You can also extend your Shiny apps with CSS themes, htmlwidgets, and JavaScript actions
- **No web development experience required!**
- Learn more at [shiny.rstudio.com](https://shiny.rstudio.com/)
]
.pull-right[
&lt;img src="img/shiny.png" alt="" width="60%" style="display: block; margin: auto auto auto 0;" /&gt;
]

---

## High level view

- Every Shiny app has a webpage that the user visits, and behind this webpage there is a computer that serves this webpage by running R

--

- When running your app locally, the computer serving your app is your computer

--

- When your app is deployed, the computer serving your app is a web server

---

# Anatomy of a Shiny app

---

## The two key pieces

Every Shiny app has two components:

.pull-left[
### User Interface (UI)
- Controls the **layout and appearance** of the app
- Defines what the user **sees** and **interacts with**
- Built with R functions that generate HTML
]

.pull-right[
### Server function
- Contains the **instructions** needed to build the app
- Defines how **inputs** are transformed into **outputs**
- Where your R code (data wrangling, plots, models) lives
]

---

## The simplest Shiny app


``` r
library(shiny)

ui &lt;- fluidPage(
  "Hello, world!"
)

server &lt;- function(input, output) {
  # Nothing here yet
}

shinyApp(ui = ui, server = server)
```

.tip[
`fluidPage()` creates a page that automatically adjusts to the browser window size. `shinyApp()` ties the UI and server together and launches the app.
]

---

class: middle

# Inputs

---

## Input functions

Inputs let the user send values to the server. Every input function has at least two arguments:

- `inputId`: a unique name used to access the value in the server (e.g., `input$name`)
- `label`: the text displayed to the user

---

## Common input types

| Function | Widget |
|:---------|:-------|
| `textInput()` | Text box |
| `numericInput()` | Number spinner |
| `sliderInput()` | Slider |
| `selectInput()` | Dropdown menu |
| `checkboxInput()` | Single checkbox |
| `checkboxGroupInput()` | Group of checkboxes |
| `radioButtons()` | Radio buttons |
| `fileInput()` | File upload |

---

## Input example: slider


``` r
ui &lt;- fluidPage(
  sliderInput(
    inputId = "num",          # access as input$num
    label = "Choose a number", # what the user sees
    value = 25,                # starting value
    min = 1,                   # minimum value
    max = 100                  # maximum value
  )
)
```

--

.question[
What do you think happens when the user moves the slider? Where does the value go?
]

---

## Accessing input values

In the server function, you access input values using `input$inputId`:


``` r
server &lt;- function(input, output) {
  # input$num contains the current slider value
  # This value updates automatically when the user moves the slider
}
```

.tip[
You can only read `input` values inside **reactive contexts** — that means inside `render*()` functions, `reactive()`, or `observe()`. You'll see why soon!
]

---

class: middle

# Outputs

---

## Output functions: A two-step process

Displaying output requires cooperation between the UI and server:

.pull-left[
### Step 1: UI placeholder
Use an `*Output()` function to create a spot in the UI:
- `plotOutput()`
- `textOutput()`
- `tableOutput()`
- `verbatimTextOutput()`
]

.pull-right[
### Step 2: Server rendering
Use a `render*()` function to generate the content:
- `renderPlot()`
- `renderText()`
- `renderTable()`
- `renderPrint()`
]

---

## The output pattern

The `outputId` connects the UI placeholder to the server rendering:


``` r
# In the UI
plotOutput(outputId = "my_plot")

# In the server
output$my_plot &lt;- renderPlot({
  # R code that creates a plot
})
```

.tip[
The names must match! `plotOutput("my_plot")` in the UI connects to `output$my_plot` in the server. This is how Shiny knows where to display each piece of output.
]

---

## Common output pairs

| Renders | UI function | Server function |
|:--------|:------------|:----------------|
| Plot | `plotOutput()` | `renderPlot()` |
| Text | `textOutput()` | `renderText()` |
| Table | `tableOutput()` | `renderTable()` |
| Printed R output | `verbatimTextOutput()` | `renderPrint()` |
| Data table | `dataTableOutput()` | `renderDataTable()` |

---

.midi[

]

`sidebarLayout()` is a common layout pattern: controls on the left, results on the right.

.midi[

&gt; **add a dropdown to select the x-axis variable**
]


``` r
ui &lt;- fluidPage(
  titlePanel("Palmer Penguins Explorer"),
  sidebarLayout(
    sidebarPanel(
*     selectInput(
*       inputId = "x_var",
*       label = "X-axis variable:",
*       choices = c("bill_length_mm", "bill_depth_mm",
*                   "flipper_length_mm", "body_mass_g")
*     )
    ),
    mainPanel()
  )
)
```

---

.midi[
&gt; ...add a dropdown to select the x-axis variable,
&gt; **add a dropdown to select the y-axis variable**
]


``` r
    sidebarPanel(
      selectInput(
        inputId = "x_var",
        label = "X-axis variable:",
        choices = c("bill_length_mm", "bill_depth_mm",
                    "flipper_length_mm", "body_mass_g")
      ),
*     selectInput(
*       inputId = "y_var",
*       label = "Y-axis variable:",
*       choices = c("bill_depth_mm", "bill_length_mm",
*                   "flipper_length_mm", "body_mass_g")
*     )
    )
```

---

.midi[
&gt; ...add dropdowns for x and y variables,
&gt; **add a checkbox to color by species**
]


``` r
    sidebarPanel(
      selectInput(
        inputId = "x_var", label = "X-axis variable:",
        choices = c("bill_length_mm", "bill_depth_mm",
                    "flipper_length_mm", "body_mass_g")
      ),
      selectInput(
        inputId = "y_var", label = "Y-axis variable:",
        choices = c("bill_depth_mm", "bill_length_mm",
                    "flipper_length_mm", "body_mass_g")
      ),
*     checkboxInput(
*       inputId = "color_species",
*       label = "Color by species",
*       value = TRUE
*     )
    )
```

---

.midi[
&gt; ...add inputs to the sidebar,
&gt; **add a plot output to the main panel**
]


``` r
    mainPanel(
*     plotOutput(outputId = "scatter_plot")
    )
```

Now the UI is set up with inputs and an output placeholder. But the plot won't appear until we write the server logic!

---

.midi[
&gt; ...set up the UI,
&gt; **write the server logic to create the plot**
]


``` r
server &lt;- function(input, output) {
* output$scatter_plot &lt;- renderPlot({
*   p &lt;- ggplot(penguins,
*               aes(x = .data[[input$x_var]],
*                   y = .data[[input$y_var]])) +
*     geom_point(size = 2, alpha = 0.7) +
*     theme_minimal() +
*     labs(x = str_replace_all(input$x_var, "_", " "),
*          y = str_replace_all(input$y_var, "_", " "))
*   p
* })
}
```

.tip[
`.data[[input$x_var]]` lets us use a string variable name inside `aes()`. This is called **tidy evaluation** with the `.data` pronoun.
]

---

.midi[
&gt; ...create the basic plot,
&gt; **add conditional coloring by species**
]


``` r
server &lt;- function(input, output) {
  output$scatter_plot &lt;- renderPlot({
*   if (input$color_species) {
*     p &lt;- ggplot(penguins,
*                 aes(x = .data[[input$x_var]],
*                     y = .data[[input$y_var]],
*                     color = species)) +
*       scale_color_viridis_d()
*   } else {
*     p &lt;- ggplot(penguins,
*                 aes(x = .data[[input$x_var]],
*                     y = .data[[input$y_var]]))
*   }
    p + geom_point(size = 2, alpha = 0.7) +
      theme_minimal() +
      labs(x = str_replace_all(input$x_var, "_", " "),
           y = str_replace_all(input$y_var, "_", " "))
  })
}
```

# Reactivity

---

## What is reactivity?

Reactivity is the **magic** that makes Shiny apps interactive.

--

- When an **input** changes, Shiny automatically re-executes the **outputs** that depend on it

--

- You don't need to write code to "listen" for changes — Shiny handles this for you

--

- This is fundamentally different from typical R scripts where you run code top-to-bottom

---

## Reactive flow

- When the user changes the x-axis dropdown, `renderPlot()` re-runs automatically
- The plot updates in the browser without refreshing the page
- Only outputs that depend on the changed input are updated

---

## Reactive expressions

What if multiple outputs use the same processed data? Use `reactive()` to avoid repeating work:


``` r
server &lt;- function(input, output) {
  # Create a reactive expression for filtered data
* filtered_data &lt;- reactive({
*   penguins %&gt;%
*     filter(species %in% input$selected_species)
* })

  output$scatter_plot &lt;- renderPlot({
*   ggplot(filtered_data(), aes(x = bill_depth_mm,
                                y = bill_length_mm)) +
      geom_point()
  })

  output$summary_table &lt;- renderTable({
*   filtered_data() %&gt;% summarize(n = n())
  })
}
```

.tip[
Call a reactive expression like a function: `filtered_data()`, not `filtered_data`. The parentheses are required!
]

---

## Rules of reactivity

1. **Reactive sources**: `input$*` values — these change when the user interacts with the app

2. **Reactive conductors**: `reactive()` expressions — these process data and cache results

3. **Reactive endpoints**: `render*()` functions — these produce output for the UI

--

.question[
Why can't you access `input$x_var` outside of a reactive context? Because Shiny needs to know *which* outputs depend on *which* inputs to know what to update!
]

# Layouts and UI design

---

## Layout functions

Shiny provides several layout options:

.pull-left[
### `sidebarLayout()`
- Sidebar + main panel
- Most common for simple apps
- Good for input controls + single output

### `fluidRow()` + `column()`
- Grid-based layout
- 12-column system (like Bootstrap)
- More flexible positioning
]

.pull-right[
### `tabsetPanel()`
- Tabbed interface
- Multiple views in the same space
- Great for multiple visualizations

### `navbarPage()`
- Navigation bar at the top
- Multiple pages in one app
- Good for complex apps
]

---

## Tabbed layout example


``` r
ui &lt;- fluidPage(
  titlePanel("Palmer Penguins Explorer"),
  sidebarLayout(
    sidebarPanel(
      selectInput("x_var", "X-axis:",
                  choices = c("bill_length_mm", "bill_depth_mm",
                              "flipper_length_mm", "body_mass_g"))
    ),
    mainPanel(
*     tabsetPanel(
*       tabPanel("Scatter Plot", plotOutput("scatter")),
*       tabPanel("Histogram", plotOutput("histogram")),
*       tabPanel("Data", dataTableOutput("data_table"))
*     )
    )
  )
)
```

# Shiny and R Markdown

---

## Embedding Shiny in R Markdown

You can add Shiny components to R Markdown documents by adding `runtime: shiny` to the YAML header:

```yaml
---
title: "My Interactive Report"
output: html_document
runtime: shiny
---
```

--

Then use `shiny` input and output functions directly in code chunks:


``` r
selectInput("var", "Variable:",
            choices = names(mtcars))

renderPlot({
  hist(mtcars[[input$var]], main = input$var)
})
```

---

## Shiny documents vs. standalone apps

.pull-left[
### Shiny documents
- R Markdown + Shiny
- Great for interactive reports
- Mixes narrative text with interactivity
- Rendered with `rmarkdown::run()`
]

.pull-right[
### Standalone apps
- Pure Shiny (app.R or ui.R + server.R)
- Better for complex applications
- More control over layout
- Run with `shiny::runApp()`
]

---

## App file structures

.pull-left[
### Single file: `app.R`

``` r
# app.R
library(shiny)

ui &lt;- fluidPage(...)
server &lt;- function(input, output) {...}
shinyApp(ui, server)
```
Good for simple apps.
]

.pull-right[
### Two files: `ui.R` + `server.R`

``` r
# ui.R
fluidPage(...)

# server.R
function(input, output) {...}
```
Better for complex apps — separates concerns.
]

# Sharing your app

---

## Deployment options

.pull-left[
### shinyapps.io
- Free tier available
- Hosted by Posit (RStudio)
- Easy deployment from RStudio
- `rsconnect::deployApp()`

### Shiny Server
- Self-hosted (open source)
- Full control over infrastructure
- Requires server administration
]

.pull-right[
### Posit Connect
- Enterprise solution
- Scheduled reports + Shiny apps
- Authentication and access control

### shinylive
- Runs R in the browser (WebAssembly)
- No server needed!
- Still experimental
]

---

## Deploying to shinyapps.io


``` r
# Install the rsconnect package
install.packages("rsconnect")

# Configure your account (one time)
rsconnect::setAccountInfo(
  name = "your-account",
  token = "your-token",
  secret = "your-secret"
)

# Deploy your app
rsconnect::deployApp()
```

.tip[
You can find your token and secret at [shinyapps.io](https://www.shinyapps.io/) under Account → Tokens.

# Tips and best practices

---

## Common mistakes

.pull-left[
### ❌ Forgetting `()` on reactive expressions


``` r
# Wrong
output$plot &lt;- renderPlot({
* ggplot(filtered_data, ...)
})

# Right
output$plot &lt;- renderPlot({
* ggplot(filtered_data(), ...)
})
```
]

.pull-right[
### ❌ Mismatched output IDs


``` r
# UI says "my_plot"
plotOutput("my_plot")

# Server says "myplot" — won't work!
*output$myplot &lt;- renderPlot({...})

# Fix: names must match exactly
*output$my_plot &lt;- renderPlot({...})
```
]

---

## Common mistakes (continued)

.pull-left[
### ❌ Reading input outside reactive context


``` r
server &lt;- function(input, output) {
  # This will error!
* x &lt;- input$num

  # This is correct
* output$text &lt;- renderText({
*   input$num
* })
}
```
]

.pull-right[
### ❌ Wrong render/output pairing


``` r
# textOutput with renderPlot — nope!
*textOutput("result")
*output$result &lt;- renderPlot({...})

# Must match:
# plotOutput  ↔ renderPlot
# textOutput  ↔ renderText
# tableOutput ↔ renderTable
```
]
